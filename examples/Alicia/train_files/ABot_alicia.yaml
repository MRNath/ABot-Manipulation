run_id: ABot_Alicia_FT
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity
wandb_project: ABot_Alicia
is_debug: false

framework:
  name: ABot_M0
  qwenvl:
    base_vlm: path_to_your_base_vlm_checkpoint
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 14
    state_dim: 14
    future_action_window_size: 29
    action_horizon: 30
    past_action_window_size: 0
    repeated_diffusion_steps: 4
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 2560
      positional_embeddings: null

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /home/kongqingwei/data
    data_mix: single_dataset
    dataset_name: recore_dataset_two_box_location_offical
    dataset_robot_type: alicia_joint_v3
    dataset_weight: 1.0
    lerobot_version: v3.0
    include_state: true
    sequential_step_sampling: false
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 4
    num_workers: 4
    load_all_data_for_training: true
    image_size: [224, 224]
    video_backend: torchvision_av
    train_test_split:
      train:
        holdout_last: 8
        shuffle_seed: 0
      test:
        holdout_last: 8
        shuffle_seed: 0

trainer:
  epochs: 100
  max_train_steps: 18000
  num_warmup_steps: 2000
  save_interval: 2000
  eval_interval: 500
  eval_num_batches: 8
  learning_rate:
    base: 5.0e-06
    qwen_vl_interface: 5.0e-06
    action_model: 5.0e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: ""
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 50
  gradient_clipping: 1.0
  gradient_accumulation_steps: 4
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
  pretrained_checkpoint: path_to_your_pretrain_ckpt
  reload_modules: qwen_vl_interface,action_model
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
  repeated_diffusion_steps: 4
